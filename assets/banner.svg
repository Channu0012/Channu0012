<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="30%" style="stop-color:#161b22"/>
      <stop offset="60%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f778ba"/>
      <stop offset="50%" style="stop-color:#ff7b72"/>
      <stop offset="100%" style="stop-color:#ffa657"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="0"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- Floating particles -->
  <g filter="url(#softglow)">
    <circle cx="80" cy="60" r="2" fill="#58a6ff" opacity="0.6">
      <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="250" r="1.5" fill="#bc8cff" opacity="0.5">
      <animate attributeName="cy" values="250;230;250" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="80" r="2.5" fill="#f778ba" opacity="0.4">
      <animate attributeName="cy" values="80;55;80" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="200" r="1.8" fill="#ffa657" opacity="0.5">
      <animate attributeName="cy" values="200;180;200" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="290" r="2" fill="#58a6ff" opacity="0.3">
      <animate attributeName="cy" values="290;270;290" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="40" r="1.5" fill="#7ee787" opacity="0.4">
      <animate attributeName="cy" values="40;25;40" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="180" r="1.2" fill="#ff7b72" opacity="0.3">
      <animate attributeName="cy" values="180;165;180" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="100" r="2" fill="#bc8cff" opacity="0.35">
      <animate attributeName="cy" values="100;80;100" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Code brackets decoration - left -->
  <g opacity="0.12" fill="none" stroke="#58a6ff" stroke-width="2">
    <text x="40" y="140" font-family="monospace" font-size="60" fill="#58a6ff" stroke="none">{</text>
    <text x="40" y="220" font-family="monospace" font-size="60" fill="#58a6ff" stroke="none">}</text>
  </g>
  
  <!-- Code brackets decoration - right -->
  <g opacity="0.12">
    <text x="830" y="120" font-family="monospace" font-size="40" fill="#bc8cff">&lt;/&gt;</text>
    <text x="810" y="240" font-family="monospace" font-size="30" fill="#f778ba">( )</text>
  </g>

  <!-- Main heading -->
  <text x="450" y="105" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="16" fill="#8b949e" letter-spacing="6" font-weight="300">
    HELLO WORLD, I'M
  </text>

  <!-- Name with gradient -->
  <text x="450" y="165" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" filter="url(#glow)" letter-spacing="2">
    Channu Patil
  </text>

  <!-- Tagline -->
  <text x="450" y="210" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="18" fill="url(#accent2)" font-weight="600" letter-spacing="1">
    Developer  ·  Entrepreneur  ·  Builder
  </text>

  <!-- Philosophy line -->
  <text x="450" y="250" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#8b949e" font-style="italic" letter-spacing="1">
    "Building the future through code — one commit at a time"
  </text>

  <!-- Animated line accent -->
  <rect x="300" y="270" width="300" height="2" rx="1" fill="url(#accent)" opacity="0.6">
    <animate attributeName="width" values="0;300" dur="2s" fill="freeze"/>
    <animate attributeName="x" values="450;300" dur="2s" fill="freeze"/>
  </rect>

  <!-- Status dots -->
  <g transform="translate(370, 292)">
    <circle cx="0" cy="0" r="4" fill="#7ee787" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="12" y="4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#7ee787" letter-spacing="1">
      OPEN TO COLLABORATE
    </text>
  </g>
</svg>
