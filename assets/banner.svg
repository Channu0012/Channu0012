<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <defs>
    <!-- Core gradients -->
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="25%" style="stop-color:#0d1321"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="75%" style="stop-color:#0d1321"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="35%" style="stop-color:#a78bfa"/>
      <stop offset="65%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
    <linearGradient id="subtitle-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="line-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#e879f9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb-blue" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="orb-purple" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep background -->
  <rect width="1000" height="400" fill="url(#bg-main)"/>
  
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.6" fill="#60a5fa" opacity="0.08"/>
  </pattern>
  <rect width="1000" height="400" fill="url(#dots)"/>

  <!-- Large ambient orbs -->
  <ellipse cx="150" cy="100" rx="200" ry="180" fill="url(#glow-blue)" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="850" cy="300" rx="220" ry="200" fill="url(#glow-purple)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="500" cy="350" rx="300" ry="100" fill="url(#glow-blue)" opacity="0.15"/>

  <!-- Floating geometric elements -->
  <g opacity="0.06">
    <!-- Hex shapes -->
    <polygon points="80,50 95,42 110,50 110,66 95,74 80,66" fill="none" stroke="#60a5fa" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 95 58;360 95 58" dur="20s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="870,70 890,60 910,70 910,90 890,100 870,90" fill="none" stroke="#a78bfa" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="360 890 80;0 890 80" dur="25s" repeatCount="indefinite"/>
    </polygon>
    <!-- Triangles -->
    <polygon points="920,340 935,315 950,340" fill="none" stroke="#e879f9" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0 935 327;360 935 327" dur="15s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="40,300 55,280 70,300" fill="none" stroke="#34d399" stroke-width="0.8">
      <animateTransform attributeName="transform" type="rotate" values="360 55 290;0 55 290" dur="18s" repeatCount="indefinite"/>
    </polygon>
    <!-- Circles -->
    <circle cx="180" cy="340" r="15" fill="none" stroke="#60a5fa" stroke-width="0.6"/>
    <circle cx="800" cy="60" r="20" fill="none" stroke="#e879f9" stroke-width="0.6"/>
  </g>

  <!-- Animated particles -->
  <g filter="url(#soft-glow)">
    <circle cx="120" cy="80" r="2" fill="#60a5fa" opacity="0.7">
      <animate attributeName="cy" values="80;55;80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="320" r="1.5" fill="#a78bfa" opacity="0.5">
      <animate attributeName="cy" values="320;295;320" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="60" r="2.5" fill="#e879f9" opacity="0.4">
      <animate attributeName="cy" values="60;35;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="250" r="1.8" fill="#fb7185" opacity="0.5">
      <animate attributeName="cy" values="250;225;250" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="350" r="2" fill="#34d399" opacity="0.4">
      <animate attributeName="cy" values="350;330;350" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="50" r="1.8" fill="#60a5fa" opacity="0.35">
      <animate attributeName="cy" values="50;30;50" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="100" r="1.2" fill="#fbbf24" opacity="0.3">
      <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Code decoration — left side -->
  <g opacity="0.07" font-family="'Courier New', monospace">
    <text x="30" y="160" font-size="14" fill="#60a5fa">const future = await</text>
    <text x="30" y="180" font-size="14" fill="#a78bfa">  channu.build();</text>
    <text x="30" y="215" font-size="14" fill="#60a5fa">if (passion === true) {</text>
    <text x="30" y="235" font-size="14" fill="#34d399">  ship(product);</text>
    <text x="30" y="255" font-size="14" fill="#60a5fa">}</text>
  </g>
  
  <!-- Code decoration — right side -->
  <g opacity="0.07" font-family="'Courier New', monospace" text-anchor="end">
    <text x="970" y="150" font-size="14" fill="#a78bfa">class Entrepreneur {</text>
    <text x="970" y="170" font-size="14" fill="#e879f9">  mindset: "growth"</text>
    <text x="970" y="190" font-size="14" fill="#a78bfa">  mission: "impact"</text>
    <text x="970" y="225" font-size="14" fill="#a78bfa">  fn iterate() {</text>
    <text x="970" y="245" font-size="14" fill="#34d399">    learn().build()</text>
    <text x="970" y="265" font-size="14" fill="#a78bfa">  }</text>
    <text x="970" y="285" font-size="14" fill="#a78bfa">}</text>
  </g>

  <!-- Top label -->
  <text x="500" y="90" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="13" fill="#94a3b8" letter-spacing="8" font-weight="400">
    WELCOME TO MY UNIVERSE
  </text>

  <!-- Accent line under label -->
  <rect x="400" y="100" width="200" height="1" rx="0.5" fill="url(#line-accent)" opacity="0.4">
    <animate attributeName="width" values="0;200" dur="1.5s" fill="freeze"/>
    <animate attributeName="x" values="500;400" dur="1.5s" fill="freeze"/>
  </rect>

  <!-- Main name -->
  <text x="500" y="175" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="60" font-weight="800" fill="url(#name-grad)" filter="url(#text-glow)" letter-spacing="3">
    Channu Patil
  </text>

  <!-- Role line -->
  <text x="500" y="220" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="20" fill="url(#subtitle-grad)" font-weight="600" letter-spacing="4">
    DEVELOPER  ·  ENTREPRENEUR  ·  BUILDER
  </text>

  <!-- Philosophy quote -->
  <g opacity="0.7">
    <text x="500" y="265" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#cbd5e1" font-style="italic" letter-spacing="0.5">
      "Building the future through code — one commit at a time"
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="320" y="290" width="360" height="1.5" rx="0.75" fill="url(#line-accent)" opacity="0.5">
    <animate attributeName="width" values="0;360" dur="2s" fill="freeze"/>
    <animate attributeName="x" values="500;320" dur="2s" fill="freeze"/>
  </rect>

  <!-- Status indicator -->
  <g transform="translate(410, 320)">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.8">
      <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#34d399" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-family="'Segoe UI', sans-serif" font-size="12" fill="#34d399" letter-spacing="3" font-weight="500">
      AVAILABLE FOR COLLABORATION
    </text>
  </g>

  <!-- Bottom tech icons row (subtle) -->
  <g transform="translate(300, 365)" opacity="0.12" fill="#94a3b8" font-family="'Segoe UI', sans-serif" font-size="11" letter-spacing="2">
    <text x="0" y="0">REACT</text>
    <text x="0" y="0" dx="60">·</text>
    <text x="0" y="0" dx="75">PYTHON</text>
    <text x="0" y="0" dx="145">·</text>
    <text x="0" y="0" dx="160">FLUTTER</text>
    <text x="0" y="0" dx="235">·</text>
    <text x="0" y="0" dx="250">AI/ML</text>
    <text x="0" y="0" dx="300">·</text>
    <text x="0" y="0" dx="315">NODE.JS</text>
  </g>
</svg>
